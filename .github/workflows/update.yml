name: Update routes

on:
  workflow_dispatch:
    inputs:
      force_update:
        description: GTFSを強制的に再取得する
        type: boolean
        default: false
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pandas

      - run: python update_routes.py
        env:
          FORCE_UPDATE: ${{ inputs.force_update || false }}

      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add direct_timetable.json station_locations.json unresolved_stations.json data
          git diff --cached --quiet || (git commit -m "Update timetable and station locations" && git push)
